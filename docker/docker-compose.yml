version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aerogrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aerogrid_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aerogrid}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aerogrid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      AEROGRID_DATABASE_URL: postgresql+asyncpg://aerogrid:${POSTGRES_PASSWORD:-aerogrid_dev}@db:5432/${POSTGRES_DB:-aerogrid}
      AEROGRID_REDIS_URL: redis://redis:6379/0
      AEROGRID_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
