version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aerogrid
      POSTGRES_PASSWORD: aerogrid
      POSTGRES_DB: aerogrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      AEROGRID_DATABASE_URL: postgresql+asyncpg://aerogrid:aerogrid@db:5432/aerogrid
      AEROGRID_REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
