name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # Stage 1: Lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - run: pip install ruff
      - run: ruff check backend/

  # Stage 2: Type Check
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - run: pip install pyright
      - run: cd backend && pyright .

  # Stage 3: Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - run: pip install -e "./backend[dev]"
      - run: cd backend && python -m pytest tests/ -v --cov=app --cov-report=xml -x --ignore=tests/test_api.py --ignore=tests/test_load.py
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: coverage, path: backend/coverage.xml }

  # Stage 4: Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: aerogrid
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aerogrid_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - run: pip install -e "./backend[dev]"
      - run: cd backend && python -m pytest tests/test_integration.py tests/test_end_to_end.py tests/test_providers_comprehensive.py -v -x
        env:
          AEROGRID_DATABASE_URL: postgresql+asyncpg://aerogrid:test@localhost:5432/aerogrid_test

  # Stage 5: Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - run: pip install bandit safety
      - run: bandit -r backend/app -f json -o bandit-report.json --severity-level medium
      - run: pip install -e "./backend[dev]" && safety check --full-report

  # Stage 6: Docker Build
  docker-build:
    runs-on: ubuntu-latest
    needs: [unit-tests, typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: aerogrid:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 7: Frontend Build
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }} }
      - run: cd frontend && npm ci && npm run build

  # Stage 8: Deploy to Staging (main branch only)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan, docker-build, frontend-build]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with: { credentials_json: '${{ secrets.GCP_SA_KEY }}' }
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker
      - run: docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/aerogrid:${{ github.sha }} .
      - run: docker push gcr.io/${{ secrets.GCP_PROJECT }}/aerogrid:${{ github.sha }}
      - run: |
          gcloud run deploy aerogrid-staging \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/aerogrid:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --no-traffic

  # Stage 9: Smoke Tests (staging)
  smoke-tests:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: |
          sleep 30
          curl -sf "${{ vars.STAGING_URL }}/api/v1/health" | jq .
          curl -sf "${{ vars.STAGING_URL }}/api/v1/signals" | jq .
          curl -sf -X POST "${{ vars.STAGING_URL }}/api/v1/observations" \
            -H "Content-Type: application/json" \
            -d '{"content":"smoke test","latitude":19.0,"longitude":72.0,"category":"smoke","device_id":"ci"}' | jq .

  # Stage 10: Production Approval (manual)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with: { credentials_json: '${{ secrets.GCP_SA_KEY }}' }
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker
      - run: docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/aerogrid:${{ github.sha }} .
      - run: docker push gcr.io/${{ secrets.GCP_PROJECT }}/aerogrid:${{ github.sha }}
      - run: |
          gcloud run deploy aerogrid-production \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/aerogrid:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --no-traffic
      - run: |
          gcloud run services update-traffic aerogrid-production \
            --to-revisions=LATEST=100 \
            --region asia-south1
