name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff pyright
      - name: Lint
        run: ruff check backend/
      - name: Type check
        run: pyright backend/
      - name: Test
        run: cd aerogrid && python -m pytest tests/ -v --cov=backend/app --cov-report=xml
      - name: Coverage check
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('coverage.xml'); print(float(tree.getroot().attrib['line-rate']) * 100)")
          echo "Coverage: $COVERAGE%"
          if [ $(echo "$COVERAGE < 90" | bc -l) -eq 1 ]; then echo "Coverage below 90%"; exit 1; fi
